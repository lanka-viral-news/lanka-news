<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Watch the video below</title>

<style>
:root{
  --red:#ff3b3b;
  --blue:#3b82f6;
  --bg1:#0f172a;
  --bg2:#1e293b;
  --card:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.2);
}

*{box-sizing:border-box}

body{
  font-family: system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  margin:0;
  padding:22px 14px 44px;
  text-align:center;
  color:#fff;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
}

/* TITLE */
.title{
  color:#fff;
  font-weight:900;
  font-size:clamp(24px,6vw,40px);
  margin:10px auto 18px;
  text-shadow:0 0 12px rgba(255,255,255,0.3);
}

/* VIDEO BOX */
.thumb-wrap{
  display:block;
  width:min(560px,92vw);
  margin:10px auto 18px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  background:#000;
  aspect-ratio:16/9;
  box-shadow:0 10px 40px rgba(0,0,0,.6);
  transition:0.3s;
}
.thumb-wrap:hover{
  transform:scale(1.03);
}

/* PLAY BUTTON */
.player-face{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
}
.play{
  transition:transform .3s ease;
}
.thumb-wrap:hover .play{
  transform:scale(1.15);
}

/* PROGRESS BAR */
.player-ui{
  position:absolute;
  left:6%;
  right:6%;
  bottom:10%;
  height:6px;
  background:#333;
  border-radius:6px;
}
.player-ui::after{
  content:"";
  display:block;
  height:100%;
  width:40%;
  background:var(--blue);
}

/* BUTTON */
.btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  margin:16px auto;
  padding:14px 26px;
  font-size:18px;
  font-weight:800;
  color:#fff;
  text-decoration:none;
  background:linear-gradient(45deg,#3b82f6,#60a5fa);
  border-radius:30px;
  box-shadow:0 0 20px rgba(59,130,246,.6);
  transition:0.3s;
}
.btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 30px rgba(59,130,246,1);
}

/* GLASS CARD */
.card{
  width:min(760px,94vw);
  margin:20px auto;
  text-align:left;
  line-height:1.8;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:20px;
  backdrop-filter:blur(12px);
  box-shadow:0 8px 30px rgba(0,0,0,.4);
}

.card h2{
  text-align:center;
  margin-bottom:12px;
  font-size:24px;
  color:#60a5fa;
}
</style>

</head>
<body>

<h1 class="title">Watch The Full Video Below</h1>

<!-- Thumbnail -->
<a class="thumb-wrap"
href="https://duskpunk.com/fqcsehqrhm?key=0645b66f30d1fdba473c4a258ea8dce4"
target="_blank">
  
  <div class="player-face">
    <svg class="play" width="120" height="120" viewBox="0 0 160 160">
      <circle cx="80" cy="80" r="42" fill="rgba(255,255,255,0.2)"/>
      <polygon points="70,58 70,102 108,80" fill="#fff"/>
    </svg>
  </div>

  <div class="player-ui"></div>
</a>

<!-- Button -->
<a class="btn"
href="https://duskpunk.com/rk3a29e6?key=76b0be22045b26d2dac768ca67fa729a"
target="_blank">
▶ Play Video
</a>

<!-- Content -->
<div class="card">
<h2>Love – The Most Noble Feeling</h2>
<p>
Love is the most noble and powerful feeling a human being can experience.
</p>
<p>
True love requires patience, understanding, and sacrifice.
</p>
<p>
Love is not just a feeling, but a choice we make every day.
</p>
</div>

  );

</script>

</body>
</html>
